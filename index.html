<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMANAT — ссылки</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* Палитра из логотипа AMANAT: античное золото #8e6c0a */
  :root{
    --black:       #0b0906;
    --black-warm:  #171208;
    --gold:        #c9a227;
    --gold-bright: #e8c766;
    --gold-deep:   #8e6c0a;
    --gold-dark:   #5e4707;
    --text:        #f0e8d4;
    --text-dim:    #9b8d69;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    font-family:'Montserrat', sans-serif;
    color:var(--text);
    background:
      radial-gradient(1100px 700px at 50% -15%, rgba(142,108,10,.28), transparent 62%),
      radial-gradient(800px 500px at 50% 115%, rgba(142,108,10,.14), transparent 60%),
      linear-gradient(180deg, #0d0a05, var(--black));
    overflow-x:hidden;
  }

  /* ===== Плавающие золотые частицы ===== */
  .particles{ position:fixed; inset:0; pointer-events:none; z-index:0; }
  .particles span{
    position:absolute;
    bottom:-10px;
    width:4px; height:4px;
    border-radius:50%;
    background:var(--gold-bright);
    opacity:0;
    animation:float linear infinite;
    box-shadow:0 0 8px 1px rgba(232,199,102,.7);
  }
  @keyframes float{
    0%   { transform:translateY(0) translateX(0) scale(.6); opacity:0; }
    10%  { opacity:.7; }
    90%  { opacity:.25; }
    100% { transform:translateY(-105vh) translateX(var(--dx)) scale(1); opacity:0; }
  }

  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:430px;
    text-align:center;
    padding:44px 32px 38px;
    border-radius:6px;
    background:linear-gradient(180deg, rgba(23,18,8,.88), rgba(11,9,6,.94));
    border:1px solid rgba(201,162,39,.35);
    box-shadow:
      0 40px 90px -25px rgba(0,0,0,.9),
      inset 0 1px 0 rgba(232,199,102,.15);
    backdrop-filter:blur(8px);
    animation:rise 1s cubic-bezier(.2,.7,.2,1) both;
  }

  /* Двойная классическая рамка — как гравировка */
  .card::before{
    content:"";
    position:absolute; inset:8px;
    border:1px solid rgba(201,162,39,.22);
    border-radius:3px;
    pointer-events:none;
  }
  /* Золотые уголки */
  .corner{
    position:absolute; width:22px; height:22px;
    border-color:var(--gold); border-style:solid;
    pointer-events:none;
  }
  .corner.tl{ top:8px;    left:8px;   border-width:2px 0 0 2px; }
  .corner.tr{ top:8px;    right:8px;  border-width:2px 2px 0 0; }
  .corner.bl{ bottom:8px; left:8px;   border-width:0 0 2px 2px; }
  .corner.br{ bottom:8px; right:8px;  border-width:0 2px 2px 0; }

  @keyframes rise{
    from{ opacity:0; transform:translateY(28px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ===== Логотип с сиянием ===== */
  .logo-wrap{
    position:relative;
    width:190px; height:180px;
    margin:0 auto 10px;
    animation:logoIn 1.4s ease both .2s;
  }
  @keyframes logoIn{
    from{ opacity:0; transform:scale(.85); filter:blur(6px); }
    to{ opacity:1; transform:scale(1); filter:blur(0); }
  }
  .logo-wrap::before{
    content:"";
    position:absolute; inset:-25%;
    background:radial-gradient(circle, rgba(201,162,39,.30), transparent 65%);
    animation:breath 4.5s ease-in-out infinite;
    z-index:0;
  }
  @keyframes breath{
    0%,100%{ opacity:.55; transform:scale(.95); }
    50%    { opacity:1;   transform:scale(1.06); }
  }
  .logo-wrap img{
    position:relative; z-index:1;
    width:100%; height:100%;
    object-fit:contain;
    filter:drop-shadow(0 6px 18px rgba(142,108,10,.55));
  }

  .tagline{
    font-size:12px;
    letter-spacing:3.5px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:28px;
    animation:fadeUp .8s ease both .6s;
  }

  /* Разделитель с ромбом */
  .divider{
    display:flex; align-items:center; justify-content:center;
    gap:10px;
    margin:0 auto 28px;
    animation:fadeUp .8s ease both .7s;
  }
  .divider::before, .divider::after{
    content:""; height:1px; width:70px;
    background:linear-gradient(90deg, transparent, var(--gold));
  }
  .divider::after{ background:linear-gradient(90deg, var(--gold), transparent); }
  .divider .gem{
    width:7px; height:7px;
    background:var(--gold);
    transform:rotate(45deg);
    box-shadow:0 0 10px rgba(232,199,102,.8);
  }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(12px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .links{ display:flex; flex-direction:column; gap:13px; }

  .btn{
    position:relative;
    display:flex;
    align-items:center;
    gap:16px;
    padding:16px 20px;
    border-radius:3px;
    text-decoration:none;
    color:var(--text);
    font-size:14px;
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
    background:linear-gradient(180deg, rgba(201,162,39,.07), rgba(201,162,39,.02));
    border:1px solid rgba(201,162,39,.35);
    overflow:hidden;
    opacity:0;
    animation:fadeUp .7s ease both;
    transition:transform .3s ease, border-color .3s ease, box-shadow .3s ease, background .3s ease;
  }
  /* Появление кнопок по очереди */
  .btn:nth-child(1){ animation-delay:.8s; }
  .btn:nth-child(2){ animation-delay:.95s; }
  .btn:nth-child(3){ animation-delay:1.1s; }
  .btn:nth-child(4){ animation-delay:1.25s; }
  .btn:nth-child(5){ animation-delay:1.4s; }

  .btn:hover{
    transform:translateY(-3px);
    border-color:var(--gold-bright);
    background:linear-gradient(180deg, rgba(201,162,39,.16), rgba(201,162,39,.05));
    box-shadow:0 14px 30px -14px rgba(142,108,10,.75), inset 0 0 20px rgba(201,162,39,.08);
  }
  .btn:active{ transform:translateY(-1px) scale(.99); }

  /* Золотой блик */
  .btn::after{
    content:"";
    position:absolute; top:0; left:-130%;
    width:70%; height:100%;
    background:linear-gradient(100deg, transparent, rgba(232,199,102,.22), transparent);
    transform:skewX(-20deg);
    transition:left .7s ease;
  }
  .btn:hover::after{ left:140%; }

  .btn .icon{
    flex:0 0 26px; width:26px; height:26px;
    display:flex; align-items:center; justify-content:center;
    color:var(--gold-bright);
    transition:transform .3s ease;
  }
  .btn:hover .icon{ transform:scale(1.15); }
  .btn .icon svg{ width:23px; height:23px; }

  .btn .label{ flex:1; text-align:left; }

  .btn .arrow{
    color:var(--gold);
    opacity:.45;
    transition:transform .3s ease, opacity .3s ease;
  }
  .btn:hover .arrow{ transform:translateX(5px); opacity:1; }

  .footer{
    margin-top:28px;
    font-family:'Cormorant Garamond', serif;
    font-size:14px;
    letter-spacing:2px;
    color:var(--text-dim);
    animation:fadeUp .8s ease both 1.6s;
  }
  .footer b{
    color:var(--gold);
    font-weight:600;
  }

  .ripple{
    position:absolute;
    border-radius:50%;
    transform:scale(0);
    background:rgba(232,199,102,.30);
    animation:ripple .6s linear;
    pointer-events:none;
  }
  @keyframes ripple{ to{ transform:scale(4); opacity:0; } }

  :focus-visible{ outline:2px solid var(--gold-bright); outline-offset:3px; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
    .btn{ opacity:1; }
  }
</style>
</head>

    <div class="divider"><span class="gem"></span></div>

    <nav class="links" id="links"></nav>

    <p class="footer"><b>AMANAT</b> &middot; <span id="year"></span></p>
  </main>

<script>
/* ============================================================
   НАСТРОЙКА — меняй только здесь
   ============================================================ */
const CONFIG = {
  tagline: "Мы на связи — выбирайте удобный способ",

  links: [
    { platform:"instagram", label:"Instagram",         url:"https://www.instagram.com/amanatprestige_hotel/" },
    { platform:"phone",     label:"+998 (50) 333-35-33", url:"tel:+998503333533" }
  ]
};

/* ====== Иконки ====== */
const ICONS = {
  instagram:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>',
  telegram: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.94 4.64 18.9 19.2c-.23 1.02-.84 1.27-1.7.79l-4.7-3.47-2.27 2.18c-.25.25-.46.46-.95.46l.34-4.8 8.73-7.89c.38-.34-.08-.53-.59-.19L7.27 13.4l-4.65-1.45c-1.01-.32-1.03-1.01.21-1.5l18.18-7c.84-.31 1.58.19 1.31 1.69z"/></svg>',
  youtube:  '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 12s0-3.2-.41-4.74a2.46 2.46 0 0 0-1.73-1.74C19.32 5.1 12 5.1 12 5.1s-7.32 0-8.86.42A2.46 2.46 0 0 0 1.41 7.26C1 8.8 1 12 1 12s0 3.2.41 4.74a2.46 2.46 0 0 0 1.73 1.74c1.54.42 8.86.42 8.86.42s7.32 0 8.86-.42a2.46 2.46 0 0 0 1.73-1.74C23 15.2 23 12 23 12zM9.75 15.02V8.98L15.5 12l-5.75 3.02z"/></svg>',
  phone:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>'
};

const ARROW = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

/* ====== Сборка ====== */
document.getElementById("tagline").textContent = CONFIG.tagline;
document.getElementById("year").textContent    = new Date().getFullYear();

const wrap = document.getElementById("links");

CONFIG.links.forEach(item => {
  const a = document.createElement("a");
  a.className = "btn";
  a.href      = item.url;
  if (item.platform !== "phone") {
    a.target = "_blank";
    a.rel    = "noopener noreferrer";
  }
  a.setAttribute("aria-label", item.label);
  a.innerHTML =
    `<span class="icon">${ICONS[item.platform] || ""}</span>
     <span class="label">${item.label}</span>
     <span class="arrow">${ARROW}</span>`;

  a.addEventListener("click", function(e){
    const r = document.createElement("span");
    const d = Math.max(this.offsetWidth, this.offsetHeight);
    r.className = "ripple";
    r.style.width = r.style.height = d + "px";
    r.style.left = (e.offsetX - d/2) + "px";
    r.style.top  = (e.offsetY - d/2) + "px";
    this.appendChild(r);
    setTimeout(() => r.remove(), 600);
  });

  wrap.appendChild(a);
});

/* ====== Золотые частицы ====== */
const pWrap = document.getElementById("particles");
const isMobile = matchMedia("(max-width: 600px)").matches;
const COUNT = isMobile ? 12 : 22;
for (let i = 0; i < COUNT; i++){
  const s = document.createElement("span");
  s.style.left = Math.random()*100 + "vw";
  s.style.setProperty("--dx", (Math.random()*120 - 60) + "px");
  s.style.animationDuration = (9 + Math.random()*11) + "s";
  s.style.animationDelay = (Math.random()*12) + "s";
  const size = 2 + Math.random()*3.5;
  s.style.width = s.style.height = size + "px";
  pWrap.appendChild(s);
}
</script>
